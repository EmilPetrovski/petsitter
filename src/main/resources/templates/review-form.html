<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leave a Review - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/my-bookings" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 500px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm border-top border-4 border-warning">
            <h2 class="fw-bold text-dark text-center mb-4"><i class="bi bi-star-fill text-warning me-2"></i>Leave a Review</h2>
            
            <form action="/review" method="post">
                <input type="hidden" name="bookingId" th:value="${bookingId}"/>
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Rating (1-5)</label><input type="number" class="form-control bg-light" name="rating" min="1" max="5" required/></div>
                <div class="mb-4"><label class="form-label text-muted fw-semibold">Comment</label><textarea class="form-control bg-light" name="comment" rows="4" placeholder="How was your experience?" required></textarea></div>
                
                <button type="submit" class="btn btn-warning w-100 py-3 fw-bold shadow-sm">Submit Review</button>
            </form>
        </div>
    </div>
</body>
</html>

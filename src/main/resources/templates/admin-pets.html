<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Pets - PetSitter Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center text-danger fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">Admin Panel</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-info-circle text-danger me-2"></i>All Platform Pets</h2>

        <div th:if="${pets.empty}" class="alert alert-light text-center py-4 border shadow-sm rounded-3">No pets exist on the platform yet.</div>

        <div class="table-responsive shadow-sm rounded border bg-white" th:if="${!pets.empty}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr><th>ID</th><th>Name</th><th>Species</th><th>Age</th><th>Owner</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="pet : ${pets}">
                        <td class="text-muted small" style="white-space: nowrap;">
                            <span th:text="${#strings.substring(pet.petId, 0, 8)} + '...'"></span>
                            <button class="btn btn-sm btn-outline-secondary border-0 py-0 px-1 ms-1" th:attr="data-id=${pet.petId}" onclick="copyToClipboard(this, this.getAttribute('data-id'))" title="Copy ID">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </td>
                        <td class="fw-semibold text-teal" th:text="${pet.name}"></td>
                        <td><span class="badge bg-secondary" th:text="${pet.petType.species}"></span></td>
                        <td th:text="${pet.age} + ' yrs'"></td>
                        <td th:text="${pet.owner.username}"></td>
                        <td class="text-end"><form action="/admin/pets/delete" method="post" onsubmit="return confirm('Delete this pet?');"><input type="hidden" name="petId" th:value="${pet.petId}"/><button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button></form></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(function() {
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="bi bi-check-lg text-success"></i>';
                setTimeout(() => { button.innerHTML = originalIcon; }, 1500);
            }, function() {
                alert('Failed to copy ID.');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Offered Services - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm border-top border-4 border-teal">
            <h2 class="fw-bold text-dark text-center mb-4"><i class="bi bi-card-checklist text-teal me-2"></i>Offered Services</h2>
            
            <form action="/services/update" method="post">
                <div th:if="${allServices.empty}" class="alert alert-light text-center py-4 border">No services exist in the system yet.</div>
                
                <div class="mb-4 p-3 bg-light rounded-3 border" th:if="${!allServices.empty}">
                    <div class="form-check mb-3" th:each="service : ${allServices}">
                        <input class="form-check-input" type="checkbox" th:id="'srv_' + ${service.serviceId}" name="serviceIds" th:value="${service.serviceId}" th:checked="${myServiceIds != null and myServiceIds.contains(service.serviceId)}"/>
                        <label class="form-check-label" th:for="'srv_' + ${service.serviceId}"><strong class="text-dark d-block" th:text="${service.type}"></strong><span class="text-muted small" th:text="${service.description}"></span></label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-teal w-100 py-3 fs-5 fw-bold shadow-sm" th:if="${!allServices.empty}">Save My Services</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Offered Services - PetSitter</title>
</head>
<body>
    <h2>Manage Offered Services</h2>
    
    <form action="/services/update" method="post">
        <div th:if="${allServices.empty}">
            <p>No services exist in the system yet.</p>
        </div>
        <ul style="list-style-type: none; padding-left: 0;" th:if="${!allServices.empty}">
            <li th:each="service : ${allServices}">
                <input type="checkbox" th:id="'srv_' + ${service.serviceId}" name="serviceIds" th:value="${service.serviceId}" 
                       th:checked="${myServiceIds != null and myServiceIds.contains(service.serviceId)}"/>
                <label th:for="'srv_' + ${service.serviceId}">
                    <strong th:text="${service.type}">Service Type</strong> - <span th:text="${service.description}">Description</span>
                </label>
            </li>
        </ul>
        <br/>
        <button type="submit" th:if="${!allServices.empty}">Save Services</button>
    </form>

    <p><br/><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>

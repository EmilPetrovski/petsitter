<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Pet - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/pets" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm border-top border-4 border-teal">
            <h2 class="fw-bold text-dark text-center mb-4"><i class="bi bi-pencil-square text-teal me-2"></i>Edit Pet Profile</h2>
            
            <div th:if="${error}" class="alert alert-danger py-2" role="alert" th:text="${error}"></div>
            
            <form action="/pets/edit" method="post">
                <input type="hidden" name="petId" th:value="${pet.petId}"/>
                
                <div class="row mb-3">
                    <div class="col-sm-5 mb-3 mb-sm-0"><label class="form-label text-muted fw-semibold">Name</label><input type="text" class="form-control bg-light text-muted" id="name" name="name" th:value="${pet.name}" disabled/></div>
                    <div class="col-sm-4 mb-3 mb-sm-0"><label class="form-label text-muted fw-semibold">Species</label><input type="text" class="form-control bg-light text-muted" id="species" name="species" th:value="${pet.petType.species}" disabled/></div>
                    <div class="col-sm-3"><label class="form-label text-muted fw-semibold">Age</label><input type="number" class="form-control bg-light" id="age" name="age" th:value="${pet.age}" required min="0"/></div>
                </div>
                
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Photo URL</label><input type="url" class="form-control bg-light" id="photoUrl" name="photoUrl" th:value="${pet.photo}" placeholder="https://..."/></div>
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Special Needs</label><textarea class="form-control bg-light" id="specialNeeds" name="specialNeeds" rows="2" th:text="${pet.specialNeeds}"></textarea></div>
                <div class="mb-4"><label class="form-label text-muted fw-semibold">Description</label><textarea class="form-control bg-light" id="description" name="description" rows="3" th:text="${pet.description}"></textarea></div>
                
                <button type="submit" class="btn btn-teal w-100 py-3 fs-5 fw-bold shadow-sm">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>

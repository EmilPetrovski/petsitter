<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Find a Sitter - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s ease-in-out; }
        .btn-teal:hover { background-color: #115e59; color: white; transform: translateY(-1px); }
        .btn-outline-teal { color: #0f766e; border-color: #0f766e; }
        .btn-outline-teal:hover { background-color: #0f766e; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <div class="d-flex gap-3">
                <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Dashboard</a>
                <a href="/logout" class="btn btn-outline-danger fw-medium px-3 rounded-pill">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card p-4 p-md-5 mb-5 shadow-sm bg-white text-center">
            <h2 class="fw-bold text-dark mb-4"><i class="bi bi-search text-teal me-2"></i>Find a Pet Sitter</h2>
            <form action="/search" method="get" class="row g-3 justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <select id="serviceType" name="serviceType" class="form-select form-select-lg shadow-sm">
                        <option value="">-- All Services --</option>
                        <option th:each="service : ${services}" th:value="${service.type}" th:text="${service.type}" th:selected="${service.type == selectedService}"></option>
                    </select>
                </div>
                <div class="col-md-3 col-lg-2">
                    <button type="submit" class="btn btn-teal btn-lg w-100 shadow-sm">Search</button>
                </div>
            </form>
        </div>

        <div th:if="${sitters != null}">
            <h4 class="fw-bold text-secondary mb-4 px-2">Search Results</h4>
            <div th:if="${sitters.empty}" class="alert alert-light text-center py-4 border">No sitters found offering this service.</div>
            
            <div class="row g-4" th:if="${!sitters.empty}">
                <div class="col-md-6 col-lg-4 col-xl-3" th:each="sitter : ${sitters}">
                    <div class="card p-4 shadow-sm h-100 text-center">
                        <i class="bi bi-person-circle display-1 text-teal mb-3 opacity-75"></i>
                        <h5 class="fw-bold"><a th:href="@{/sitter(sitterId=${sitter.userId})}" class="text-dark text-decoration-none" th:text="${sitter.firstName + ' ' + sitter.lastName}"></a></h5>
                        <p class="text-muted mb-4 fs-6">
                            <span th:if="${ratings[sitter.userId] > 0.0}"><i class="bi bi-star-fill text-warning me-1"></i><strong th:text="${ratings[sitter.userId] % 1 == 0 ? #numbers.formatInteger(ratings[sitter.userId], 1) : #numbers.formatDecimal(ratings[sitter.userId], 1, 1)}"></strong>/5</span>
                            <span th:if="${ratings[sitter.userId] == 0.0}"><em>No reviews yet</em></span>
                        </p>
                        <a th:href="@{/book(sitterId=${sitter.userId}, serviceType=${selectedService})}" class="btn btn-outline-teal mt-auto w-100 rounded-pill">Book Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Pets - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; transform: translateY(-1px); }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); overflow: hidden; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <div class="d-flex gap-3">
                <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Dashboard</a>
            </div>
        </div>
    </nav>
    
    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark m-0"><i class="bi bi-info-circle text-teal me-2"></i>My Pets</h2>
            <a href="/pets/add" class="btn btn-teal rounded-pill px-4"><i class="bi bi-plus-lg me-1"></i> Add New Pet</a>
        </div>
        
        <div th:if="${pets.empty}" class="alert alert-light text-center py-5 border shadow-sm rounded-3">
            <i class="bi bi-balloon-heart text-muted fs-1 d-block mb-3"></i>
            <h5 class="text-muted">You haven't added any pets yet.</h5>
        </div>
        
        <div class="row g-4" th:if="${!pets.empty}">
            <div class="col-md-6 col-lg-4 col-xl-3" th:each="pet : ${pets}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:if="${pet.photo != null and !pet.photo.empty}" th:src="${pet.photo}" class="card-img-top" alt="Pet Photo" style="height: 200px; object-fit: cover;">
                    <div th:if="${pet.photo == null or pet.photo.empty}" class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                        <i class="bi bi-camera text-muted opacity-25" style="font-size: 4rem;"></i>
                    </div>
                    <div class="card-body">
                        <h4 class="card-title fw-bold text-teal mb-1" th:text="${pet.name}"></h4>
                        <h6 class="card-subtitle mb-3 text-muted fw-medium" th:text="${pet.petType.species} + ' • ' + ${pet.age} + ' yrs'"></h6>
                        
                        <p class="card-text small text-secondary mb-2" th:if="${pet.description != null and !pet.description.empty}" th:text="${pet.description}"></p>
                        <p class="card-text small text-danger bg-danger bg-opacity-10 p-2 rounded-2 mt-2" th:if="${pet.specialNeeds != null and !pet.specialNeeds.empty}">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> <strong th:text="${pet.specialNeeds}"></strong>
                        </p>
                    </div>
                    <div class="card-footer bg-white border-0 d-flex justify-content-between pb-3 pt-0">
                        <a th:href="@{/pets/edit(petId=${pet.petId})}" class="btn btn-sm btn-outline-secondary px-3">Edit Profile</a>
                        <form action="/pets/delete" method="post" onsubmit="return confirm('Are you sure you want to remove this pet?');">
                            <input type="hidden" name="petId" th:value="${pet.petId}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger px-3"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

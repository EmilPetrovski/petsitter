<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add a Pet - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/pets" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm border-top border-4 border-teal">
            <h2 class="fw-bold text-dark text-center mb-4"><i class="bi bi-plus-circle text-teal me-2"></i>Add a New Pet</h2>
            
            <div th:if="${error}" class="alert alert-danger py-2" role="alert" th:text="${error}"></div>
            
            <form action="/pets/add" method="post">
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Pet Name</label><input type="text" class="form-control bg-light" id="name" name="name" required="required"/></div>
                
                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0">
                        <label class="form-label text-muted fw-semibold">Species</label>
                        <select class="form-select bg-light" id="petTypeId" name="petTypeId" required="required">
                            <option th:each="type : ${petTypes}" th:value="${type.pettypeId}" th:text="${type.species}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label text-muted fw-semibold">Age (Years)</label>
                        <input type="number" class="form-control bg-light" id="age" name="age" required="required" min="0"/>
                    </div>
                </div>
                
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Photo URL (Optional)</label><input type="url" class="form-control bg-light" id="photoUrl" name="photoUrl" placeholder="https://..."/></div>
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Special Needs (Optional)</label><textarea class="form-control bg-light" id="specialNeeds" name="specialNeeds" rows="2"></textarea></div>
                <div class="mb-4"><label class="form-label text-muted fw-semibold">Description (Optional)</label><textarea class="form-control bg-light" id="description" name="description" rows="3"></textarea></div>
                
                <button type="submit" class="btn btn-teal w-100 py-3 fs-5 fw-bold shadow-sm">Add Pet</button>
            </form>
        </div>
    </div>
</body>
</html>

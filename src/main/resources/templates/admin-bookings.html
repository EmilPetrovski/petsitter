<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Bookings - PetSitter Admin</title>
</head>
<body>
    <h2>All Platform Bookings</h2>

    <div th:if="${bookings.empty}">
        <p>No bookings exist on the platform yet.</p>
    </div>

    <table border="1" th:if="${!bookings.empty}">
        <tr>
            <th>ID</th>
            <th>Owner</th>
            <th>Sitter</th>
            <th>Dates</th>
            <th>Address</th>
            <th>Service</th>
            <th>Pets</th>
            <th>Payment</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        <tr th:each="booking : ${bookings}">
            <td th:text="${booking.bookingId}"></td>
            <td th:text="${booking.owner.username}"></td>
            <td th:text="${booking.sitter.username}"></td>
            <td>
                <span th:text="${booking.dateFrom} + ' to ' + ${booking.dateTo}"></span><br/>
                <em>(<span th:text="${booking.dateTo.toEpochDay() - booking.dateFrom.toEpochDay() + 1}"></span> day(s))</em>
            </td>
            <td th:text="${booking.address}"></td>
            <td>
                <span th:each="service, iterStat : ${booking.services}">
                    <span th:text="${service.type}"></span><span th:if="${!iterStat.last}">, </span>
                </span>
                <em th:if="${booking.services == null or booking.services.empty}">None</em>
            </td>
            <td>
                <span th:each="pet, iterStat : ${booking.pets}">
                    <span th:text="${pet.name} + ' (' + ${pet.petType.species} + ', ' + ${pet.age} + ' years)'"></span><span th:if="${!iterStat.last}">, </span>
                </span>
            </td>
            <td>
                <span th:if="${booking.payment != null}" th:text="${booking.payment.amount} + ' MKD (' + ${booking.payment.paymentType} + ')'"></span>
                <em th:if="${booking.payment == null}">Unpaid</em>
            </td>
            <td th:text="${booking.status}"></td>
            <td>
                <form action="/admin/bookings/delete" method="post" onsubmit="return confirm('Are you sure you want to delete this booking?');">
                    <input type="hidden" name="bookingId" th:value="${booking.bookingId}"/>
                    <button type="submit" style="color: red;">Delete</button>
                </form>
            </td>
        </tr>
    </table>

    <p><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>

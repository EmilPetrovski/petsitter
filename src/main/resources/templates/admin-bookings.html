<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Bookings - PetSitter Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center text-danger fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">Admin Panel</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-calendar text-danger me-2"></i>All Platform Bookings</h2>

        <div th:if="${bookings.empty}" class="alert alert-light text-center py-4 border shadow-sm rounded-3">No bookings exist on the platform yet.</div>

        <div class="table-responsive shadow-sm rounded border bg-white" th:if="${!bookings.empty}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr><th>ID</th><th>Owner</th><th>Sitter</th><th>Dates</th><th>Address</th><th>Service</th><th>Pets</th><th>Payment</th><th>Status</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td class="text-muted small" style="white-space: nowrap;">
                            <span th:text="${#strings.substring(booking.bookingId, 0, 8)} + '...'"></span>
                            <button class="btn btn-sm btn-outline-secondary border-0 py-0 px-1 ms-1" th:attr="data-id=${booking.bookingId}" onclick="copyToClipboard(this, this.getAttribute('data-id'))" title="Copy ID">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </td>
                        <td class="fw-semibold" th:text="${booking.owner.username}"></td>
                        <td class="fw-semibold" th:text="${booking.sitter.username}"></td>
                        <td class="small"><span th:text="${booking.dateFrom} + ' to ' + ${booking.dateTo}"></span><br><em class="text-muted" th:text="${booking.dateTo.toEpochDay() - booking.dateFrom.toEpochDay() + 1} + ' day(s)'"></em></td>
                        <td class="small" th:text="${booking.address}"></td>
                        <td class="small"><span th:each="service, i : ${booking.services}"><span th:text="${service.type}"></span><span th:if="${!i.last}">, </span></span><em class="text-muted" th:if="${booking.services == null or booking.services.empty}">None</em></td>
                        <td class="small"><span th:each="pet, i : ${booking.pets}"><span th:text="${pet.name}"></span><span th:if="${!i.last}">, </span></span></td>
                        <td class="small"><span th:if="${booking.payment != null}" th:text="${booking.payment.amount} + ' MKD'"></span><em class="text-muted" th:if="${booking.payment == null}">Unpaid</em></td>
                        <td><span class="badge" th:classappend="${booking.status == 'Confirmed' or booking.status == 'Completed' ? 'bg-success' : (booking.status == 'Rejected' or booking.status == 'Canceled' ? 'bg-danger' : 'bg-warning text-dark')}" th:text="${booking.status}"></span></td>
                        <td class="text-end">
                            <form action="/admin/bookings/delete" method="post" onsubmit="return confirm('Delete this booking permanently?');">
                                <input type="hidden" name="bookingId" th:value="${booking.bookingId}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete Booking"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(function() {
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="bi bi-check-lg text-success"></i>';
                setTimeout(() => { button.innerHTML = originalIcon; }, 1500);
            }, function() {
                alert('Failed to copy ID.');
            });
        }
    </script>
</body>
</html>

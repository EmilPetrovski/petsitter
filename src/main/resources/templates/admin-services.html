<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Services - PetSitter Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-danger fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">Admin Panel</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-list-ul text-danger me-2"></i>Platform Services</h2>

        <div class="row g-4 mb-5">
            <div class="col-md-7 col-lg-8">
                <div class="card p-4 shadow-sm border-0">
                    <div th:if="${services.empty}" class="alert alert-light text-center py-4 m-0 border">No services exist on the platform yet.</div>
                    <ul class="list-group list-group-flush" th:if="${!services.empty}">
                        <li class="list-group-item d-flex justify-content-between align-items-center py-3" th:each="svc : ${services}">
                            <div><strong class="fs-5 text-dark" th:text="${svc.type}"></strong><p class="mb-0 text-muted small" th:text="${svc.description}"></p></div>
                            <form action="/admin/services/delete" method="post" onsubmit="return confirm('Permanently delete this service?');"><input type="hidden" name="serviceId" th:value="${svc.serviceId}"/><button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button></form>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="col-md-5 col-lg-4">
                <div class="card p-4 shadow-sm border-top border-4 border-danger">
                    <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle text-danger me-2"></i>Add New Service</h5>
                    <form action="/admin/services/add" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-semibold">Service Name</label>
                            <input type="text" class="form-control bg-light" id="type" name="type" required="required"/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-semibold">Description</label>
                            <textarea class="form-control bg-light" id="description" name="description" rows="3" required="required"></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 fw-bold shadow-sm">Add Service</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PetSitter - Find the Perfect Sitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .text-teal { color: #0f766e; }
        .bg-teal { background-color: #0f766e; }
        .btn-teal {
            background-color: #0f766e;
            color: white;
            transition: all 0.2s ease-in-out;
        }
        .btn-teal:hover {
            background-color: #115e59;
            color: white;
            transform: translateY(-2px);
        }
        .btn-outline-teal {
            color: #0f766e;
            border-color: #0f766e;
            border-width: 2px;
            transition: all 0.2s ease-in-out;
        }
        .btn-outline-teal:hover {
            background-color: #0f766e;
            color: white;
            transform: translateY(-2px);
        }
        .hero-section {
            /* Adds a teal tint over the background image to make white text pop */
            background-image: linear-gradient(135deg, rgba(15, 118, 110, 0.85) 0%, rgba(15, 118, 110, 0.5) 100%), url('/images/photo_landing_page.jpg');
            background-size: cover;
            background-position: center;
            min-height: calc(100vh - 76px); /* subtracts navbar height */
        }
        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/">
                <img src="/images/logo.png" alt="PetSitter Logo">
                PetSitter
            </a>
            <div class="d-flex gap-3">
                <a href="/login" class="btn btn-outline-teal fw-bold px-4 rounded-pill">Log In</a>
                <a href="/signup" class="btn btn-teal fw-bold px-4 rounded-pill shadow-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section d-flex align-items-center justify-content-center text-center flex-grow-1">
        <div class="container text-white px-4">
            <h1 class="display-3 fw-bold mb-4" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.4);">Reliable Pet Care in Your Neighborhood</h1>
            <p class="lead mb-5 fw-medium fs-4" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.4);">Find trusted sitters for your furry friends, or offer your own services to pet owners.</p>
            <a href="/signup" class="btn btn-light text-teal btn-lg px-5 py-3 fw-bold rounded-pill shadow-lg" style="font-size: 1.2rem;">Get Started</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users - PetSitter Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center text-danger fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">Admin Panel</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-people text-danger me-2"></i>All Platform Users</h2>

        <div th:if="${users.empty}" class="alert alert-light text-center py-4 border shadow-sm rounded-3">No users exist on the platform yet.</div>

        <div class="table-responsive shadow-sm rounded border bg-white" th:if="${!users.empty}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th>ID</th><th>Username</th><th>Name</th><th>Email</th><th>Details</th><th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td class="text-muted small" style="white-space: nowrap;">
                            <span th:text="${#strings.substring(user.userId, 0, 8)} + '...'"></span>
                            <button class="btn btn-sm btn-outline-secondary border-0 py-0 px-1 ms-1" th:attr="data-id=${user.userId}" onclick="copyToClipboard(this, this.getAttribute('data-id'))" title="Copy ID">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </td>
                        <td class="fw-semibold" th:text="${user.username}"></td>
                        <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                        <td><a th:href="'mailto:' + ${user.email}" class="text-decoration-none" th:text="${user.email}"></a></td>
                        <td class="small">
                            <div th:if="${ownerPets != null and ownerPets.containsKey(user.userId)}" class="mb-1">
                                <span class="badge bg-info text-dark me-1">Owner</span>
                                <span th:each="pet, iterStat : ${ownerPets[user.userId]}"><span th:text="${pet.name} + ' (' + ${pet.petType.species} + ')'"></span><span th:if="${!iterStat.last}">, </span></span>
                                <em class="text-muted" th:if="${ownerPets[user.userId].empty}">No pets</em>
                            </div>
                            <div th:if="${sitterServices != null and sitterServices.containsKey(user.userId)}">
                                <span class="badge bg-primary me-1">Sitter</span>
                                <span th:each="service, iterStat : ${sitterServices[user.userId]}"><span th:text="${service.type}"></span><span th:if="${!iterStat.last}">, </span></span>
                                <em class="text-muted" th:if="${sitterServices[user.userId].empty}">No services</em>
                            </div>
                        </td>
                        <td class="text-end">
                            <form action="/admin/users/delete" method="post" onsubmit="return confirm('Permanently delete this user and ALL their data?');" th:if="${user.username != 'admin_darko'}">
                                <input type="hidden" name="userId" th:value="${user.userId}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete User"><i class="bi bi-trash"></i></button>
                            </form>
                            <span class="badge bg-danger" th:if="${user.username == 'admin_darko'}">Admin</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function copyToClipboard(button, text) {
            navigator.clipboard.writeText(text).then(function() {
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="bi bi-check-lg text-success"></i>';
                setTimeout(() => { button.innerHTML = originalIcon; }, 1500);
            }, function() {
                alert('Failed to copy ID.');
            });
        }
    </script>
</body>
</html>

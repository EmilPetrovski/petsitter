<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - PetSitter</title>
</head>
<body>
    <h2>Edit My Profile</h2>
    
    <form action="/profile/update" method="post">
        <div>
            <label for="username">Username (Cannot be changed):</label>
            <input type="text" id="username" name="username" th:value="${user.username}" disabled="disabled"/>
        </div>
        <div>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" th:value="${user.firstName}" required="required"/>
        </div>
        <div>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" th:value="${user.lastName}" required="required"/>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" th:value="${user.email}" required="required"/>
        </div>
        <button type="submit">Save Changes</button>
    </form>
    
    <p><br/><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 500px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm border-top border-4 border-teal">
            <div class="text-center mb-4"><i class="bi bi-person-circle display-1 text-teal opacity-75"></i><h3 class="fw-bold text-dark mt-2">Edit Profile</h3></div>
            
            <form action="/profile/update" method="post">
                <div class="mb-3"><label class="form-label text-muted fw-semibold">Username <small>(Read Only)</small></label><input type="text" class="form-control bg-light text-muted" name="username" th:value="${user.username}" disabled/></div>
                
                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0"><label class="form-label text-muted fw-semibold">First Name</label><input type="text" class="form-control bg-light" name="firstName" th:value="${user.firstName}" required/></div>
                    <div class="col-sm-6"><label class="form-label text-muted fw-semibold">Last Name</label><input type="text" class="form-control bg-light" name="lastName" th:value="${user.lastName}" required/></div>
                </div>
                
                <div class="mb-4"><label class="form-label text-muted fw-semibold">Email</label><input type="email" class="form-control bg-light" name="email" th:value="${user.email}" required/></div>
                
                <button type="submit" class="btn btn-teal w-100 py-3 fw-bold shadow-sm">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>

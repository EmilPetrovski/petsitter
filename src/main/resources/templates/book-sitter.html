<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Sitter - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .bg-teal { background-color: #0f766e; color: white; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s ease-in-out; }
        .btn-teal:hover { background-color: #115e59; color: white; transform: translateY(-1px); }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/search" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Cancel</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">
        <div class="card p-4 p-md-5 bg-white">
            <h2 class="fw-bold text-dark text-center mb-1">Book <span th:text="${sitter.firstName}"></span> <span th:text="${sitter.lastName}"></span></h2>
            <p class="text-center text-muted mb-4" th:if="${serviceType != null and !serviceType.empty}">Requested Service: <strong class="text-teal" th:text="${serviceType}"></strong></p>
            
            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">You must select at least 1 pet for this booking!</div>
            
            <form action="/book" method="post">
                <input type="hidden" name="sitterId" th:value="${sitter.userId}"/>
                <input type="hidden" name="serviceType" th:value="${serviceType}" th:if="${serviceType != null and !serviceType.empty}"/>
                
                <div class="row mb-3">
                    <div class="col-sm-6 mb-3 mb-sm-0"><label class="form-label text-muted fw-semibold">From Date:</label><input class="form-control bg-light" type="date" id="dateFrom" name="dateFrom" required onchange="calculateDays()"/></div>
                    <div class="col-sm-6"><label class="form-label text-muted fw-semibold">To Date:</label><input class="form-control bg-light" type="date" id="dateTo" name="dateTo" required onchange="calculateDays()"/></div>
                </div>
                <p class="text-end text-secondary mb-4 small fw-medium">Duration: <span id="daysCount" class="text-dark">0 day(s)</span></p>
                
                <div class="mb-4"><label class="form-label text-muted fw-semibold">Address:</label><input class="form-control bg-light" type="text" id="address" name="address" placeholder="Where will this take place?" required/></div>
                
                <div class="mb-4 p-3 bg-light rounded-3 border">
                    <label class="form-label text-secondary fw-semibold d-block mb-3">Select Pets for this booking:</label>
                    <div th:each="pet : ${pets}" class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" th:id="'pet_' + ${pet.petId}" name="petIds" th:value="${pet.petId}"/>
                        <label class="form-check-label fw-medium text-dark" th:for="'pet_' + ${pet.petId}" th:text="${pet.name} + ' (' + ${pet.petType.species} + ')'"></label>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-sm-6 mb-3 mb-sm-0"><label class="form-label text-muted fw-semibold">Amount (MKD):</label><input class="form-control bg-light" type="number" id="amount" name="amount" min="1" required/></div>
                    <div class="col-sm-6">
                        <label class="form-label text-muted fw-semibold">Payment Method:</label>
                        <select class="form-select bg-light" id="paymentType" name="paymentType" required>
                            <option value="Card">Card</option><option value="Cash">Cash</option><option value="Bank transfer">Bank transfer</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-teal w-100 py-3 fs-5 fw-bold shadow-sm">Send Booking Request</button>
            </form>
        </div>
    </div>

    <script>
        function calculateDays() {
            var from = document.getElementById('dateFrom').value;
            var to = document.getElementById('dateTo').value;
            if (from && to) {
                var fromDate = new Date(from);
                var toDate = new Date(to);
                if (toDate >= fromDate) {
                    var diffTime = Math.abs(toDate - fromDate);
                    var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                    document.getElementById('daysCount').innerText = diffDays + " day(s)";
                } else {
                    document.getElementById('daysCount').innerText = "Invalid date range";
                }
            }
        }
    </script>
</body>
</html>

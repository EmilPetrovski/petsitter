<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sitter Profile - PetSitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/search" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Back to Search</a>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 700px;">
        <div class="card p-4 p-md-5 bg-white shadow-sm mb-4 text-center">
            <i class="bi bi-person-circle display-1 text-teal mb-3 opacity-75"></i>
            <h2 class="fw-bold text-dark mb-1" th:text="${sitter.firstName + ' ' + sitter.lastName}"></h2>
            <p class="text-muted fs-5 mb-4">
                <i class="bi bi-star-fill text-warning me-1" th:if="${averageRating > 0.0}"></i>
                <span class="fw-bold text-dark" th:if="${averageRating > 0.0}" th:text="${averageRating % 1 == 0 ? #numbers.formatInteger(averageRating, 1) : #numbers.formatDecimal(averageRating, 1, 1)}"></span><span th:if="${averageRating > 0.0}">/5</span>
                <em th:if="${averageRating == 0.0}">No reviews yet</em>
            </p>
            <a th:href="@{/book(sitterId=${sitter.userId})}" class="btn btn-teal btn-lg rounded-pill px-5 shadow-sm">Book this Sitter</a>
        </div>

        <h4 class="fw-bold text-secondary mb-3 px-2">Reviews</h4>
        <div th:if="${reviews.empty}" class="alert alert-light text-center py-4 border shadow-sm rounded-3">No reviews have been left for this sitter.</div>
        <div class="list-group shadow-sm" th:if="${!reviews.empty}">
            <div class="list-group-item p-4" th:each="review : ${reviews}"><h5 class="text-warning mb-2"><i class="bi bi-star-fill me-1"></i><span th:text="${review.rating}"></span>/5</h5><p class="mb-0 text-dark fst-italic">"<span th:text="${review.comment}"></span>"</p></div>
        </div>
    </div>
</body>
</html>

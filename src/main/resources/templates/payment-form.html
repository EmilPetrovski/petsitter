<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Make a Payment - PetSitter</title>
</head>
<body>
    <h2>Make a Payment</h2>
    
    <form action="/payment" method="post">
        <input type="hidden" name="bookingId" th:value="${bookingId}"/>
        <div>
            <label for="amount">Amount (MKD):</label>
            <input type="number" id="amount" name="amount" min="1" required="required"/>
        </div>
        <div>
            <label for="paymentType">Payment Type:</label>
            <select id="paymentType" name="paymentType" required="required">
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="Cash">Cash</option>
            </select>
        </div>
        <button type="submit">Submit Payment</button>
    </form>
    
    <p><a href="/my-bookings">Cancel</a></p>
</body>
</html>

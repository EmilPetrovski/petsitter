<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bookings - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-outline-teal { color: #0f766e; border-color: #0f766e; }
        .btn-outline-teal:hover { background-color: #0f766e; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Dashboard</a>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-calendar-check text-teal me-2"></i>My Bookings</h2>

        <div th:if="${activeBookings.empty and inactiveBookings.empty}" class="alert alert-light text-center py-5 border shadow-sm rounded-3">
            <i class="bi bi-calendar-x text-muted fs-1 d-block mb-3"></i>
            <h5 class="text-muted">You have no bookings yet.</h5>
        </div>

        <div th:if="${!activeBookings.empty}" class="mb-5">
            <h4 class="fw-bold text-secondary mb-3">Active Bookings</h4>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="booking : ${activeBookings}">
                    <div class="card h-100 p-4 shadow-sm border-top border-4 border-teal bg-white">
                        <h5 class="fw-bold mb-3 text-dark"><i class="bi bi-person-circle text-muted me-2"></i><span th:text="${booking.sitter.firstName + ' ' + booking.sitter.lastName}"></span></h5>
                        <p class="mb-1 small"><strong>Dates:</strong> <span th:text="${booking.dateFrom}"></span> to <span th:text="${booking.dateTo}"></span></p>
                        <p class="mb-1 small text-muted"><i class="bi bi-geo-alt-fill me-1"></i><span th:text="${booking.address}"></span></p>
                        <p class="mb-1 small" th:if="${booking.services != null and !booking.services.empty}"><strong>Service:</strong> <span th:each="service, i : ${booking.services}"><span th:text="${service.type}"></span><span th:if="${!i.last}">, </span></span></p>
                        <p class="mb-3 small"><strong>Pets:</strong> <span th:each="pet, i : ${booking.pets}"><span th:text="${pet.name}"></span><span th:if="${!i.last}">, </span></span></p>
                        
                        <div class="mt-auto pt-3 border-top">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge px-3 py-2" th:classappend="${booking.status == 'Confirmed' ? 'bg-success' : 'bg-warning text-dark'}" th:text="${booking.status}"></span>
                                <a th:href="'mailto:' + ${booking.sitter.email}" class="text-teal" title="Email Sitter"><i class="bi bi-envelope-fill fs-5"></i></a>
                            </div>
                            <div th:if="${booking.payment != null}" class="small text-muted mb-3">
                                <i class="bi bi-credit-card me-1"></i> <span th:text="${booking.payment.amount} + ' MKD (' + ${booking.payment.paymentType} + ')'"></span>
                            </div>
                            <form th:if="${booking.status == 'Pending' or booking.status == 'Confirmed'}" action="/my-bookings/cancel" method="post" onsubmit="return confirm('Are you sure you want to cancel?');">
                                <input type="hidden" name="bookingId" th:value="${booking.bookingId}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100">Cancel Booking</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${!inactiveBookings.empty}">
            <h4 class="fw-bold text-secondary mb-3">Past Bookings</h4>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="booking : ${inactiveBookings}">
                    <div class="card h-100 p-4 shadow-sm border-top border-4 border-secondary bg-light bg-opacity-50">
                        <h5 class="fw-bold mb-3 text-secondary"><i class="bi bi-person-circle text-muted me-2"></i><span th:text="${booking.sitter.firstName + ' ' + booking.sitter.lastName}"></span></h5>
                        <p class="mb-1 small"><strong>Dates:</strong> <span th:text="${booking.dateFrom}"></span> to <span th:text="${booking.dateTo}"></span></p>
                        <p class="mb-1 small text-muted"><i class="bi bi-geo-alt-fill me-1"></i><span th:text="${booking.address}"></span></p>
                        <p class="mb-1 small" th:if="${booking.services != null and !booking.services.empty}"><strong>Service:</strong> <span th:each="service, i : ${booking.services}"><span th:text="${service.type}"></span><span th:if="${!i.last}">, </span></span></p>
                        <p class="mb-3 small"><strong>Pets:</strong> <span th:each="pet, i : ${booking.pets}"><span th:text="${pet.name}"></span><span th:if="${!i.last}">, </span></span></p>
                        
                        <div class="mt-auto pt-3 border-top">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge px-3 py-2" th:classappend="${booking.status == 'Completed' ? 'bg-success' : 'bg-danger'}" th:text="${booking.status}"></span>
                            </div>
                            <div th:if="${booking.status == 'Completed'}" class="mt-3">
                                <a th:if="${booking.review == null}" th:href="@{/review(bookingId=${booking.bookingId})}" class="btn btn-teal btn-sm w-100">Leave a Review</a>
                                <div th:if="${booking.review != null}" class="small bg-white p-2 rounded border">
                                    <span class="text-warning"><i class="bi bi-star-fill"></i> <span th:text="${booking.review.rating}"></span>/5</span><br>
                                    <em class="text-muted">"<span th:text="${booking.review.comment}"></span>"</em>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

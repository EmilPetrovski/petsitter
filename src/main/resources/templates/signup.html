<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
        }
        .text-teal {
            color: #0f766e;
        }
        .btn-teal {
            background-color: #0f766e;
            color: white;
            transition: all 0.2s ease-in-out;
        }
        .btn-teal:hover {
            background-color: #115e59;
            color: white;
            transform: translateY(-1px);
        }
        .btn-outline-teal {
            color: #0f766e;
            border-color: #0f766e;
        }
        .btn-outline-teal:hover, .btn-check:checked + .btn-outline-teal {
            background-color: #0f766e;
            color: white;
            border-color: #0f766e;
        }
        .form-floating > label {
            color: #6c757d;
        }
        .form-control:focus {
            border-color: #14b8a6;
            box-shadow: 0 0 0 0.25rem rgba(15, 118, 110, 0.25);
        }
        .left-pane {
            background-image: url('/images/photo_landing_page.jpg');
            background-size: cover;
            background-position: center;
        }
        .overlay {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.8) 0%, rgba(15, 118, 110, 0.4) 100%);
        }
    </style>
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex flex-column flex-lg-row p-0">
        
        <!-- Left Branding Pane -->
        <div class="col-lg-5 left-pane d-none d-lg-block position-relative">
            <div class="overlay position-absolute top-0 bottom-0 start-0 end-0 d-flex flex-column justify-content-center p-5 text-white">
                <h1 class="display-4 fw-bold mb-3">Welcome to PetSitter</h1>
                <p class="lead fw-medium">Connect with trusted pet lovers in your community. Whether you need a sitter or want to offer your services, you're in the right place.</p>
            </div>
        </div>

        <!-- Right Form Pane -->
        <div class="col-lg-7 d-flex align-items-center justify-content-center bg-white p-4 p-md-5">
            <div class="w-100" style="max-width: 500px;">
                <div class="text-center mb-4">
                    <img src="/images/logo.png" alt="PetSitter Logo" height="80" class="mb-3">
                    <h2 class="fw-bold text-dark mb-1">Create an account</h2>
                    <p class="text-muted">Join PetSitter today.</p>
                </div>
                
                <div th:if="${error}" class="alert alert-danger py-2 rounded-3" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
                </div>

                <form action="/signup" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required="required"/>
                        <label for="username" class="text-muted"><i class="bi bi-person me-2"></i>Username</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="firstName" name="firstName" placeholder="First Name" required="required"/>
                                <label for="firstName" class="text-muted">First Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Last Name" required="required"/>
                                <label for="lastName" class="text-muted">Last Name</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required="required"/>
                        <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email address</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required="required"/>
                        <label for="password" class="text-muted"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small text-uppercase mb-2">I am a</label>
                        <div class="d-flex gap-2">
                            <input type="radio" class="btn-check" name="role" id="roleOwner" value="OWNER" checked required="required"/>
                            <label class="btn btn-outline-teal w-100 py-2 fw-medium shadow-sm" for="roleOwner">Pet Owner</label>

                            <input type="radio" class="btn-check" name="role" id="roleSitter" value="SITTER" required="required"/>
                            <label class="btn btn-outline-teal w-100 py-2 fw-medium shadow-sm" for="roleSitter">Pet Sitter</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-teal w-100 py-3 fs-5 fw-bold rounded-3 shadow-sm">Sign Up</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Already have an account? <a href="/login" class="text-teal fw-semibold text-decoration-none">Log in here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

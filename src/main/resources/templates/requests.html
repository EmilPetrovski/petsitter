<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Requests - PetSitter</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .text-teal { color: #0f766e; }
        .btn-teal { background-color: #0f766e; color: white; transition: all 0.2s; }
        .btn-teal:hover { background-color: #115e59; color: white; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center text-teal fw-bold fs-4" href="/dashboard"><img src="/images/logo.png" height="40" class="me-2">PetSitter</a>
            <a href="/dashboard" class="btn btn-outline-secondary fw-medium px-3 rounded-pill">Dashboard</a>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-inbox text-teal me-2"></i>My Booking Requests</h2>

        <div th:if="${activeRequests.empty and inactiveRequests.empty}" class="alert alert-light text-center py-5 border shadow-sm rounded-3">
            <i class="bi bi-inbox text-muted fs-1 d-block mb-3"></i>
            <h5 class="text-muted">You have no booking requests.</h5>
        </div>

        <div th:if="${!activeRequests.empty}" class="mb-5">
            <h4 class="fw-bold text-secondary mb-3">Active Requests</h4>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="booking : ${activeRequests}">
                    <div class="card h-100 p-4 shadow-sm border-top border-4 border-teal bg-white">
                        <h5 class="fw-bold mb-3 text-dark"><i class="bi bi-person-circle text-muted me-2"></i><span th:text="${booking.owner.firstName + ' ' + booking.owner.lastName}"></span></h5>
                        <p class="mb-1 small"><strong>Dates:</strong> <span th:text="${booking.dateFrom}"></span> to <span th:text="${booking.dateTo}"></span></p>
                        <p class="mb-1 small text-muted"><i class="bi bi-geo-alt-fill me-1"></i><span th:text="${booking.address}"></span></p>
                        <p class="mb-1 small" th:if="${booking.services != null and !booking.services.empty}"><strong>Service:</strong> <span th:each="service, i : ${booking.services}"><span th:text="${service.type}"></span><span th:if="${!i.last}">, </span></span></p>
                        <p class="mb-3 small"><strong>Pets:</strong> <span th:each="pet, i : ${booking.pets}"><span th:text="${pet.name + ' (' + pet.petType.species + ')'}"></span><span th:if="${!i.last}">, </span></span></p>
                        
                        <div class="mt-auto pt-3 border-top">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge px-3 py-2" th:classappend="${booking.status == 'Confirmed' ? 'bg-success' : 'bg-warning text-dark'}" th:text="${booking.status}"></span>
                                <a th:href="'mailto:' + ${booking.owner.email}" class="text-teal"><i class="bi bi-envelope-fill fs-5"></i></a>
                            </div>
                            <div th:if="${booking.payment != null}" class="small text-muted mb-3"><i class="bi bi-credit-card me-1"></i> <span th:text="${booking.payment.amount} + ' MKD (' + ${booking.payment.paymentType} + ')'"></span></div>
                            
                            <div th:if="${booking.status == 'Pending'}" class="d-flex gap-2">
                                <form action="/requests/update" method="post" class="flex-fill"><input type="hidden" name="bookingId" th:value="${booking.bookingId}"/><input type="hidden" name="status" value="Confirmed"/><button type="submit" class="btn btn-teal w-100 btn-sm">Accept</button></form>
                                <form action="/requests/update" method="post" class="flex-fill"><input type="hidden" name="bookingId" th:value="${booking.bookingId}"/><input type="hidden" name="status" value="Rejected"/><button type="submit" class="btn btn-outline-danger w-100 btn-sm">Reject</button></form>
                            </div>
                            <div th:if="${booking.status == 'Confirmed'}" class="d-flex gap-2">
                                <form action="/requests/update" method="post" class="flex-fill"><input type="hidden" name="bookingId" th:value="${booking.bookingId}"/><input type="hidden" name="status" value="Completed"/><button type="submit" class="btn btn-success w-100 btn-sm">Complete</button></form>
                                <form action="/requests/update" method="post" onsubmit="return confirm('Cancel this booking?');"><input type="hidden" name="bookingId" th:value="${booking.bookingId}"/><input type="hidden" name="status" value="Canceled"/><button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-x-circle"></i></button></form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${!inactiveRequests.empty}">
            <h4 class="fw-bold text-secondary mb-3">Past Requests</h4>
            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="booking : ${inactiveRequests}">
                    <div class="card h-100 p-4 shadow-sm border-top border-4 border-secondary bg-light bg-opacity-50">
                        <h5 class="fw-bold mb-3 text-secondary"><i class="bi bi-person-circle text-muted me-2"></i><span th:text="${booking.owner.firstName + ' ' + booking.owner.lastName}"></span></h5>
                        <p class="mb-1 small"><strong>Dates:</strong> <span th:text="${booking.dateFrom}"></span> to <span th:text="${booking.dateTo}"></span></p>
                        <p class="mb-1 small text-muted"><i class="bi bi-geo-alt-fill me-1"></i><span th:text="${booking.address}"></span></p>
                        <p class="mb-1 small" th:if="${booking.services != null and !booking.services.empty}"><strong>Service:</strong> <span th:each="service, i : ${booking.services}"><span th:text="${service.type}"></span><span th:if="${!i.last}">, </span></span></p>
                        <p class="mb-3 small"><strong>Pets:</strong> <span th:each="pet, i : ${booking.pets}"><span th:text="${pet.name + ' (' + pet.petType.species + ')'}"></span><span th:if="${!i.last}">, </span></span></p>
                        
                        <div class="mt-auto pt-3 border-top">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge px-3 py-2" th:classappend="${(booking.status == 'Completed' or booking.status == 'Reviewed') ? 'bg-success' : 'bg-danger'}" th:text="${booking.status}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
